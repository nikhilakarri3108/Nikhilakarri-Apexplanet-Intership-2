<html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional Web Task</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav class="navbar">
      <h1><b>My Webpage</h1>
    </nav>
  </header>

  <main class="container">
    <section class="form-section">
      <h2>Contact Us</h2>
      <form id="contactForm">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter the Name" name="name" required />

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter the E-Mail" name="email" required />

        <label for="message">Message:</label>
        <textarea id="message" placeholder="Enter the Message" name="message" required></textarea>

        <button type="submit">Send</button>
      </form>
    </section>

    <section class="todo-section">
      <h2>My To-Do List</h2>
      <div class="todo-container">
        <input type="text" id="todoInput" placeholder="Enter a task" />
        <button onclick="addTodo()">Add</button>
        <ul id="todoList"></ul>
      </div>
    </section>
  </main>

  <footer>
    <p>©2026 NIKHILA KARRI </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
